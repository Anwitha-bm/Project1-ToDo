<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>To-Do</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url('https://i0.wp.com/blogs.shu.edu/ThroughTheDecades/files/2018/02/1920x1080-dark-pastel-purple-solid-color-background.jpg');
            background-size: cover;
        }

        .glass {
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="glass p-4 text-white">

        <h1 class="text-center">📝 My Todo App</h1>

        <form action="/add" method="post" class="d-flex mt-4">
            <input type="text" name="task" class="form-control me-2" required>
            <button class="btn btn-success">Add</button>
        </form>

        <ul class="list-group mt-4">

            <li class="list-group-item d-flex justify-content-between align-items-center"
                th:each="task : ${tasks}">

                <a th:href="@{'/toggle/' + ${task.id}}" style="flex-grow:1; text-decoration:none;">
                    <span th:text="${task.name}"
                          th:classappend="${task.completed} ? 'completed' : ''">
                    </span>
                </a>

                <a th:href="@{'/edit/' + ${task.id}}" class="btn btn-warning btn-sm">Edit</a>

                <a th:href="@{'/delete/' + ${task.id}}" class="btn btn-danger btn-sm ms-2">x</a>

            </li>

        </ul>

    </div>
</div>

</body>
</html>
